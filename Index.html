<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Ricky's Archive</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* ===== PRELOADER ===== */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #080808;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #loader-bar {
      width: 60%;
      height: 8px;
      background: #222;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }

    #loader-progress {
      width: 0%;
      height: 100%;
      background: #ff8c00;
      transition: width 0.2s ease;
    }

    #loader-text {
      font-size: 1.2rem;
      margin-top: 12px;
    }

    /* ===== MAIN CONTENT (HIDDEN BY PRELOADER) ===== */
    #content {
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .logo {
      width: 500px;
      max-width: 90%;
      margin-bottom: 40px;
      cursor: pointer;
      transition: transform 1.5s ease-out, filter 1.5s ease-out;
    }

    /* Hover grow */
    .logo:hover {
      transform: scale(1.1);
    }

    /* Pop/flash state */
    .logo.pop {
      transform: scale(1.25);
      filter: brightness(0) invert(1);
      transition: none; /* instant pop */
    }

    .arrow {
      width: 60px;
      cursor: pointer;
      animation: bounce 2s infinite;
      opacity: 0.7;
      margin-top: 20px;
      transition: transform 0.3s ease;
    }

    .arrow:hover {
      transform: scale(1.2);
      opacity: 1;
    }

    .arrow.flipped {
      transform: scaleX(-1);
    }

    /* Projects grid */
    .projects {
      padding: 40px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .project-card {
      background: #141414;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
    }

    .project-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 6px;
    }

    .project-card h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .project-card p {
      margin: 0;
      font-size: 0.95rem;
      color: #ddd;
    }

    .project-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }
  </style>
</head>
<body>

  <!-- PRELOADER -->
  <div id="preloader">
    <div id="loader-text">Loading…</div>
    <div id="loader-bar">
      <div id="loader-progress"></div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="content">

    <section class="hero">
      <h1 id="title-text">Ricky's Archive</h1>

      <img
        class="logo"
        id="logo"
        src="https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/ConeTransp.png"
        alt="Archive Logo"
      >

      <img
        class="arrow"
        src="https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/Arrow.svg"
        alt="Scroll Down"
      >
    </section>

    <!-- Area where full project pages will be injected when served by Google Apps Script -->
    <div id="page-area"></div>

    <section class="projects" id="links">
      <h2>Projects</h2>
    </section>

  </div>

  <!-- Inline projects JSON fallback for local file usage -->
  <script id="projects-data" type="application/json">
    [
      {"id":"millyclicker","image":"https://i.ibb.co/gZ0Mw644/Bleh-cad.jpg","title":"Silly Milly Clicker!","description":"A cute clicker game starring Bleh Cat.","url":"https://script.google.com/macros/s/AKfycbyQr90EN-jQowq6oT1env_hAp8KdoWcDfQ9ySMhhpkgUOzWlHu0P72X-ynN7_vr-tB4Eg/exec"}
    ]
  </script>

  <script>
    // ———————————————————
    // PRELOADER LOGIC
    // ———————————————————
    const fonts = [
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/Arial.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/CaviarDreams.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/LEMONMILK-Regular.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/StrechPro.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/StoneIron-Regular.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/CaviarDreams.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/annabel%201.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/nasalization%20rg.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/monograph-Regular.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/Garet-Book.ttf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/Coolvetica%20Hv%20Comp.otf",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/FontsS/Palmas.otf"
    ];

    const images = [
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/ConeTransp.png",
      "https://raw.githubusercontent.com/rickyvr-byte/RArchive/main/Arrow.svg"
    ];

    const assets = [];
    fonts.forEach(url => assets.push({type: "font", url}));
    images.forEach(url => assets.push({type: "image", url}));

    let loadedCount = 0;
    const totalCount = assets.length;

    const loaderProgress = document.getElementById("loader-progress");
    const loaderText = document.getElementById("loader-text");
    const preloaderEl = document.getElementById("preloader");
    const contentEl = document.getElementById("content");

    function updateProgress() {
      const pct = Math.floor((loadedCount / totalCount) * 100);
      loaderProgress.style.width = pct + "%";
      loaderText.textContent = "Loading " + pct + "%";
    }

    function assetLoaded() {
      loadedCount++;
      updateProgress();
      if (loadedCount === totalCount) {
        setTimeout(() => {
          preloaderEl.style.opacity = "0";
          setTimeout(() => {
            preloaderEl.style.display = "none";
            contentEl.style.opacity = "1";
            contentEl.style.pointerEvents = "auto";
            applyRandomFont(); // apply font after load
          }, 500);
        }, 300);
      }
    }

    function preloadImage(url) {
      const img = new Image();
      img.onload = assetLoaded;
      img.onerror = assetLoaded;
      img.src = url;
    }

    function preloadFont(url) {
      const fontName = url.split("/").pop().split(".")[0];
      const font = new FontFace(fontName, `url(${url})`);
      font.load().then(() => {
        document.fonts.add(font);
        assetLoaded();
      }).catch(assetLoaded);
    }

    assets.forEach(asset => {
      if (asset.type === "image") preloadImage(asset.url);
      if (asset.type === "font") preloadFont(asset.url);
    });

    // ———————————————————
    // RANDOM FONT LOGIC
    // ———————————————————
    function applyRandomFont() {
      const randomIndex = Math.floor(Math.random() * fonts.length);
      const fontName = fonts[randomIndex].split("/").pop().split(".")[0];
      document.body.style.fontFamily = `"${fontName}", sans-serif`;
    }

    // When running inside Google Apps Script, the server can return full page HTML
    // via google.script.run.getPageContent(pageName). This callback will inject
    // the returned content into `#page-area`.
    function updateContent(html) {
      const area = document.getElementById('page-area');
      if (area) area.innerHTML = html;
    }

    // Global error handlers to avoid silent failures and reveal the content for debugging
    window.addEventListener('error', function (evt) {
      console.error('Uncaught error:', evt.error || evt.message);
      try {
        preloaderEl.style.display = 'none';
        contentEl.style.opacity = '1';
        contentEl.style.pointerEvents = 'auto';
        const links = document.getElementById('links');
        if (links) links.insertAdjacentHTML('beforeend', `<div style="color:#ff8c00;padding:12px">Error: ${String(evt.error || evt.message)}</div>`);
      } catch (e) {}
    });

    window.addEventListener('unhandledrejection', function (evt) {
      console.error('Unhandled rejection:', evt.reason);
      try {
        preloaderEl.style.display = 'none';
        contentEl.style.opacity = '1';
        contentEl.style.pointerEvents = 'auto';
        const links = document.getElementById('links');
        if (links) links.insertAdjacentHTML('beforeend', `<div style="color:#ff8c00;padding:12px">Promise error: ${String(evt.reason)}</div>`);
      } catch (e) {}
    });

    // ———————————————————
    // LOGO FLASH ANIMATION
    // ———————————————————
const logo = document.getElementById("logo");

logo.addEventListener("click", () => {
  // Remove any transition to make pop instant
  logo.style.transition = "none";

  // Add pop class to scale & turn white instantly
  logo.classList.add("pop");

  // Force reflow so browser registers the class
  void logo.offsetWidth;

  // Restore transition for smooth scale back
  logo.style.transition = "transform 1.5s ease-out, filter 1.5s ease-out";

  // Remove pop after a tiny delay so it smoothly scales back down
  setTimeout(() => {
    logo.classList.remove("pop");
  }, 10);

  // Apply random font
  applyRandomFont();
});

    // ———————————————————
    // ARROW TOGGLE SCROLL
    // ———————————————————
    const arrow = document.querySelector(".arrow");
    let arrowDown = true;
    let projectsLoaded = false;

    async function loadProjects() {
      try {
        let projects = null;

        // Try inline JSON first (works when opening file locally)
        const inline = document.getElementById('projects-data');
        if (inline && inline.textContent.trim()) {
          projects = JSON.parse(inline.textContent);
        } else {
          const res = await fetch("ProjectsDisplay.json", { cache: "no-store" });
          if (!res.ok) throw new Error("Failed to load projects JSON");
          projects = await res.json();
        }

        if (!Array.isArray(projects)) throw new Error('Projects JSON is not an array');

        const container = document.getElementById("links");

        projects.forEach(p => {
          const card = document.createElement("div");
          card.className = "project-card";

          const img = document.createElement("img");
          img.src = p.image || "";
          img.alt = p.title || "Project image";

          const title = document.createElement("h3");
          title.textContent = p.title || "Untitled";

          const desc = document.createElement("p");
          desc.textContent = p.description || "";

          card.appendChild(img);
          card.appendChild(title);
          card.appendChild(desc);

          // Determine link: prefer explicit `url`, fall back to Website/<id>.html or <id>.html
          let href = p.url && String(p.url).trim();
          if (!href) {
            if (p.id) href = `Website/${p.id}.html`;
            else href = `./`;
          }

          const anchor = document.createElement('a');
          anchor.className = 'project-link';
          anchor.href = href;

          const isExternal = /^(https?:)?\/\//.test(href);

          if (isExternal) {
            // External links open in a new tab and remove the current page content
            anchor.target = '_blank';
            anchor.addEventListener('click', function () {
              try {
                const content = document.getElementById('content');
                if (content) content.innerHTML = '';
                const pageArea = document.getElementById('page-area');
                if (pageArea) pageArea.innerHTML = '';
              } catch (err) {
                console.warn('Could not clear page content', err);
              }
            });
          } else {
            // When running as a Google Apps Script webapp, request the file content
            // from the server (by page name) and inject it into #page-area.
              try {
              if (typeof google !== 'undefined' && google.script && google.script.run) {
                const pageName = href.replace(/^.*\//, '').replace(/\.html$/i, '');
                anchor.addEventListener('click', function (e) {
                  e.preventDefault();
                  google.script.run.withSuccessHandler(updateContent).getPageContent(pageName);
                });
              }
            } catch (e) {
              // ignore - not running in GAS
            }
          }

          anchor.appendChild(card);
          container.appendChild(anchor);
        });

        projectsLoaded = true;
      } catch (e) {
        console.error("Error loading projects:", e);
      }
    }

    arrow.addEventListener("click", async () => {
      if (arrowDown) {
        if (!projectsLoaded) await loadProjects();
        document.getElementById("links").scrollIntoView({ behavior: "smooth" });
      } else {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      arrowDown = !arrowDown;
      arrow.classList.toggle("flipped", !arrowDown);
    });
  </script>
</body>
</html>
